<!DOCTYPE html>
<html>

<head>
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>
    <header id="cabecalho">
        <div class="logo">
            <img src="imagens/logo_marca_livros.png" alt="logo">

        </div>
    </header>

    <div id="corpo">
        <form onsubmit="alert('cadastro realizado com sucesso')" id="formulario" action="index.html">
            <h1>Criar Conta</h1>
            <label>Nome:</label><br>
            <input class="campoInput" type="text" required><br>

            <label>Sexo:</label><br>
            <input class="campoRadio" type="radio" id="opcao1" name="grupo1" value="m">
            <label class="radioLabel" for="opcao1">Masculino</label><br>

            <input class="campoRadio" type="radio" id="opcao2" name="grupo1" value="f">
            <label class="radioLabel" for="opcao2">Feminino</label><br><br>


            <label for="observacao">Observações:</label><br>
            <textarea id="caixa-texto" name="Observações" placeholder="Texto Observações opcional aqui..."></textarea><br>


            <label>Email:</label><br>
            <input class="campoInput" type="email" required><br>

            <label>Senha:</label><br>
            <input class="campoInput" type="password" required><br>

            <label>Confirmar Senha:</label><br>
            <input class="campoInput" type="password" required><br>


            <button  type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
            <br>
            <a href="index.html">Voltar</a>
        </form>
    </div>


</body>

</html>
